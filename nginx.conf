# Nginx конфиг для NDT Ninja PWA
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/rss+xml application/atom+xml image/svg+xml;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # PWA: Service Worker нужен с правильными заголовками
        location /sw.js {
            add_header Cache-Control "no-cache";
            add_header Service-Worker-Allowed "/";
        }

        # Workbox файлы — long-term cache (hash в имени)
        location ~* ^/workbox-.*\.js$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Manifest
        location /manifest.webmanifest {
            add_header Content-Type "application/manifest+json";
            expires 1h;
        }

        # Static assets (images, fonts, sounds)
        location ~* \.(png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|wav|mp3)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # JS/CSS — versioned через hash
        location ~* \.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback + CORS headers
        location / {
            try_files $uri $uri/ /index.html;
            
            # CORS для локальной сети
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
        }
    }
}
