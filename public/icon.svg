<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Фон (темно-синий) -->
  <rect width="512" height="512" fill="#0a0a1a"/>
  
  <!-- Лезвие меча (сине-голубое сияние) -->
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="50%" style="stop-color:#0088ff"/>
      <stop offset="100%" style="stop-color:#0044aa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Рукоятка меча -->
  <rect x="196" y="380" width="20" height="100" fill="#8b7355" rx="4"/>
  <circle cx="206" cy="490" r="12" fill="#666"/>
  <rect x="170" y="360" width="72" height="16" fill="#554433" rx="4"/>
  
  <!-- Гарда -->
  <ellipse cx="206" cy="360" rx="50" ry="15" fill="#aaa"/>
  
  <!-- Лезвие (диагональное, изогнутое движение) -->
  <path 
    d="M 206 360 L 100 200 Q 80 160 120 120 L 380 140 L 360 100 L 320 110 Z" 
    fill="url(#blade)" 
    filter="url(#glow)"
    stroke="#00ffff"
    stroke-width="2"/>
</svg>
